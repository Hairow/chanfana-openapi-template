<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览器指纹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
        }

        .container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h2 {
            margin-bottom: 24px;
            color: #333;
        }

        button {
            padding: 12px 32px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        #result {
            margin-top: 20px;
            word-break: break-all;
            font-size: 13px;
            color: #666;
            background: #f9fafb;
            padding: 16px;
            border-radius: 8px;
            text-align: left;
            min-height: 40px;
        }

        #result em {
            color: #999;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>浏览器指纹</h2>
        <button id="generateBtn" onclick="generateFingerprint()">生成指纹</button>
        <div id="result"><em>点击按钮生成</em></div>
    </div>

    <script src="https://unpkg.com/vue@2.6.14/dist/vue.js"></script>
    <script src="https://openfpcdn.io/fingerprintjs/v4/iife.min.js"></script>
    <script>
        async function generateFingerprint() {
            const btn = document.getElementById("generateBtn");
            const result = document.getElementById("result");
            btn.disabled = true;
            btn.textContent = "生成中...";
            result.innerHTML = "<em>正在采集...</em>";

            try {
                const fp = await FingerprintJS.load();
                const data = await fp.get();
                const comps = data.components;
                const allKeys = Object.keys(comps);
                const valid = allKeys.filter(k => comps[k].value !== undefined).length;
                const errors = allKeys.filter(k => comps[k].error).length;
                result.innerHTML =
                    `<strong>visitorId:</strong><br>${data.visitorId}<br><br>` +
                    `<strong>置信度:</strong> ${Math.round(data.confidence.score * 100)}%` +
                    ` （${valid}/41 项有效，${errors} 项报错）`;
                console.log("完整指纹:", data);
            } catch (err) {
                result.innerHTML = `<span style="color:red">生成失败: ${err.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.textContent = "生成指纹";
            }
        }
    </script>
</body>

</html>
